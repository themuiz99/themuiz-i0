<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TheMuiZ | IP - เช็คไอพีและประวัติการเข้าใช้งาน v1.6</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Sarabun:wght@400;700&display=swap');
        
        body {
            background-color: #0f172a;
            font-family: 'Inter', 'Sarabun', sans-serif;
            color: #f1f5f9;
        }
        .card {
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 1.5rem;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3);
        }
        .loader {
            border: 3px solid #334155;
            border-top: 3px solid #3b82f6;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            animation: spin 1s linear infinite;
            display: inline-block;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        html, body {
            overflow: hidden;
            height: 100%;
        }
        .history-scroll::-webkit-scrollbar {
            width: 6px;
        }
        .history-scroll::-webkit-scrollbar-track {
            background: #1e293b;
        }
        .history-scroll::-webkit-scrollbar-thumb {
            background: #334155;
            border-radius: 10px;
        }
        .history-scroll::-webkit-scrollbar-thumb:hover {
            background: #475569;
        }
    </style>
</head>
<body class="h-[100dvh] flex flex-col p-4">

    <div class="w-full max-w-md mx-auto h-full flex flex-col gap-4">
        
        <!-- Header -->
        <div class="text-center pt-2 pb-1 flex-shrink-0">
            <h1 class="text-2xl font-extrabold tracking-tight bg-gradient-to-r from-blue-400 via-indigo-400 to-purple-400 bg-clip-text text-transparent">
                TheMuiZ <span class="text-slate-500 font-light mx-1">|</span> IP
            </h1>
        </div>
        
        <!-- Status Card -->
        <div class="card p-6 text-center relative overflow-hidden flex-shrink-0">
            <div class="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-blue-600 via-indigo-500 to-purple-600"></div>
            
            <span class="text-slate-400 font-semibold uppercase tracking-widest text-[10px]">สถานะการเชื่อมต่อ</span>
            
            <div id="ip-display" class="text-3xl font-extrabold text-white my-5 break-all tracking-tighter leading-tight">
                <span class="loader mr-2"></span>
                <span class="text-slate-500 text-base font-normal">กำลังตรวจสอบ...</span>
            </div>
            
            <div class="flex justify-center items-center gap-3">
                <div id="status-badge" class="hidden items-center px-4 py-1.5 rounded-full text-[11px] font-bold bg-emerald-500/10 text-emerald-400 border border-emerald-500/20">
                    <span class="w-1.5 h-1.5 mr-2 bg-emerald-500 rounded-full animate-pulse"></span>
                    ออนไลน์
                </div>
                
                <button onclick="fetchIP()" id="refresh-btn" class="flex items-center px-5 py-1.5 rounded-full text-[11px] font-bold bg-blue-600 hover:bg-blue-500 text-white transition-all active:scale-95 shadow-md shadow-blue-900/40 group">
                    <i class="fa-solid fa-rotate-right mr-1.5 group-hover:rotate-180 transition-transform duration-500" id="refresh-icon"></i>
                    เช็คไอพีใหม่
                </button>
            </div>
        </div>

        <!-- History Card -->
        <div class="card p-6 flex-grow flex flex-col overflow-hidden">
            <div class="flex justify-between items-center mb-4 flex-shrink-0">
                <h2 class="text-sm font-bold text-slate-100 flex items-center">
                    <div class="w-8 h-8 rounded-lg bg-blue-500/10 flex items-center justify-center mr-3">
                        <i class="fa-solid fa-history text-blue-400 text-xs"></i>
                    </div>
                    ประวัติการเช็ค
                </h2>
                <button onclick="clearHistory()" class="text-[9px] text-slate-500 hover:text-red-400 font-bold transition-colors uppercase tracking-widest px-3 py-1 border border-slate-700 rounded-md hover:border-red-400/30">
                    ล้างประวัติ
                </button>
            </div>

            <div class="overflow-y-auto flex-grow history-scroll pr-2">
                <table class="w-full text-left">
                    <thead class="text-[9px] text-slate-500 uppercase tracking-[0.2em] border-b border-slate-700/50 sticky top-0 bg-[#1e293b] z-10">
                        <tr>
                            <th class="pb-2 font-bold pl-1">เวลา</th>
                            <th class="pb-2 font-bold text-right pr-1">ไอพีแอดเดรส</th>
                        </tr>
                    </thead>
                    <tbody id="history-body" class="text-slate-300 divide-y divide-slate-700/30">
                    </tbody>
                </table>
                <div id="no-history" class="hidden py-10 text-center">
                    <div class="inline-flex items-center justify-center w-12 h-12 rounded-full bg-slate-700/20 mb-3">
                        <i class="fa-solid fa-ghost text-slate-600 text-xl"></i>
                    </div>
                    <p class="text-slate-500 text-[11px] font-medium">ยังไม่มีข้อมูลในเครื่องนี้</p>
                </div>
            </div>
        </div>

        <!-- Footer -->
        <div class="flex-shrink-0 text-center pb-2 pt-1 border-t border-slate-800/60">
            <p class="text-slate-600 text-[10px] mb-1">
                อ้างอิง: <a href="https://www.ipify.org" target="_blank" class="text-blue-500 hover:text-blue-400 transition-colors">ipify.org</a>
            </p>
            <div class="flex justify-center items-center gap-2 text-slate-500">
                <span class="text-[10px] font-bold uppercase tracking-wider">Created by <span class="text-blue-400">TheMuiZ</span></span>
                <span class="text-[9px] font-bold uppercase tracking-widest opacity-50">v1.6</span>
            </div>
        </div>
    </div>

    <!-- Toast -->
    <div id="toast" class="fixed bottom-6 left-1/2 -translate-x-1/2 px-6 py-3 bg-blue-600 text-white text-xs font-bold rounded-xl opacity-0 shadow-[0_15px_30px_rgba(37,99,235,0.3)] transition-all duration-500 pointer-events-none z-50 flex items-center border border-white/10">
        <i class="fa-solid fa-copy mr-2 text-sm"></i> คัดลอกแล้วจ้า!
    </div>

    <script>
        const historyBody = document.getElementById('history-body');
        const noHistory = document.getElementById('no-history');
        const ipDisplay = document.getElementById('ip-display');
        const statusBadge = document.getElementById('status-badge');
        const toast = document.getElementById('toast');
        const refreshIcon = document.getElementById('refresh-icon');

        let isFetching = false;
        let memoryHistory = []; 
        let lastFetchedIP = "";

        function safeGetItem(key) { try { return localStorage.getItem(key); } catch (e) { return null; } }
        function safeSetItem(key, value) { try { localStorage.setItem(key, value); return true; } catch (e) { return false; } }
        function safeRemoveItem(key) { try { localStorage.removeItem(key); return true; } catch (e) { return false; } }

        async function fetchIP() {
            if (isFetching) return;
            isFetching = true;
            refreshIcon.classList.add('fa-spin');
            try {
                const response = await fetch('https://api.ipify.org?format=json');
                if (!response.ok) throw new Error();
                const data = await response.json();
                lastFetchedIP = data.ip;
                updateUI(data.ip);
                saveHistory(data.ip);
            } catch (e) {
                ipDisplay.innerHTML = `<span class="text-red-500 text-lg font-bold">เชื่อมต่อไม่สำเร็จ</span>`;
                ipDisplay.onclick = null;
                statusBadge.style.display = 'none';
            } finally {
                setTimeout(() => { refreshIcon.classList.remove('fa-spin'); isFetching = false; }, 800);
            }
        }

        function updateUI(ip) {
            ipDisplay.innerHTML = ip;
            ipDisplay.classList.add('cursor-pointer', 'hover:text-blue-500');
            ipDisplay.onclick = () => copyText(ip);
            statusBadge.style.display = 'inline-flex';
        }

        function saveHistory(ip) {
            const now = new Date();
            const timestamp = now.toLocaleString('th-TH', { hour: '2-digit', minute: '2-digit' });
            let history = JSON.parse(safeGetItem('ip_history_v1') || '[]') || memoryHistory;
            if (history.length > 0 && history[0].ip === ip) { renderHistory(); return; }
            history.unshift({ ip, timestamp });
            if (history.length > 50) history.pop();
            if (!safeSetItem('ip_history_v1', JSON.stringify(history))) memoryHistory = history;
            renderHistory();
        }

        function renderHistory() {
            let history = JSON.parse(safeGetItem('ip_history_v1') || '[]') || memoryHistory;
            if (history.length === 0) { historyBody.innerHTML = ''; noHistory.classList.remove('hidden'); return; }
            noHistory.classList.add('hidden');
            historyBody.innerHTML = history.map(item => {
                const color = (lastFetchedIP && item.ip === lastFetchedIP) ? 'text-amber-500' : 'text-slate-300 group-hover:text-blue-400';
                return `<tr class="hover:bg-slate-800/50 transition-all group">
                    <td class="py-3 text-[11px] text-slate-500 pl-1 font-medium">${item.timestamp}</td>
                    <td class="py-3 font-mono text-[12px] font-bold text-right pr-1 cursor-pointer transition-colors ${color}" onclick="copyText('${item.ip}')">
                        ${item.ip}
                    </td>
                </tr>`;
            }).join('');
        }

        function clearHistory() {
            if (window.confirm('ลบประวัติทั้งหมดใช่ไหมคะ?')) {
                safeRemoveItem('ip_history_v1');
                memoryHistory = [];
                renderHistory();
            }
        }

        function copyText(text) {
            const temp = document.createElement('textarea');
            temp.value = text;
            document.body.appendChild(temp);
            temp.select();
            document.execCommand('copy');
            document.body.removeChild(temp);
            toast.classList.replace('opacity-0', 'opacity-100');
            setTimeout(() => toast.classList.replace('opacity-100', 'opacity-0'), 2000);
        }

        window.onload = () => { fetchIP(); renderHistory(); };
    </script>
</body>
</html>
